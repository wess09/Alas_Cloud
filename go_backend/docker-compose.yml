version: '3.8'

services:
  alas-api:
    build: 
      context: .
      dockerfile: Dockerfile
    image: alas-cloud-go:latest
    container_name: alas-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - alas-data:/app/data
    environment:
      - TZ=Asia/Shanghai
      - DATA_DIR=/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  alas-data:
    driver: local
