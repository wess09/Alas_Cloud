version: '3.8'

services:
  alas-api:
    build: .
    image: hajiming/alas-cloud:latest
    container_name: alas-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # 使用命名 volume 解决权限问题
      - alas-data:/app/data
    environment:
      - TZ=Asia/Shanghai
      - DATA_DIR=/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

# 定义命名 volume
volumes:
  alas-data:
    driver: local
