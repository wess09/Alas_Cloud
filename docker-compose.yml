version: '3.8'

services:
  alas-api:
    build: ./go_backend
    image: hajiming/alas-cloud:latest
    container_name: alas-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - TZ=Asia/Shanghai
      - DATABASE_URL=root:Dn6p6mCb5QPxXxXVHcpY@tcp(mysql:3306)/alas_cloud?charset=utf8mb4&parseTime=True&loc=Local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
